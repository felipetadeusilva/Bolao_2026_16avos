<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking — Bolão 16 Avos 2026</title>
<style>
  :root {
    --bg: #0a0e1a;
    --card: #111827;
    --card2: #161d2e;
    --border: rgba(255,255,255,0.08);
    --gold: #f5a623;
    --gold2: #ffd700;
    --text: #e8eaf0;
    --muted: #6b7280;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #60a5fa;
    --r: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding-bottom: 40px; }

  header { background: linear-gradient(135deg, #0f1729 0%, #1a0a2e 100%); border-bottom: 1px solid rgba(245,166,35,0.2); padding: 18px 16px 14px; text-align: center; }
  header h1 { font-size: 1.25rem; font-weight: 800; color: var(--gold2); }
  header p { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }
  .phase-badge { display: inline-block; background: rgba(245,166,35,0.15); border: 1px solid rgba(245,166,35,0.3); color: var(--gold); font-size: 0.65rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-top: 6px; letter-spacing: 0.05em; text-transform: uppercase; }

  .wrap { max-width: 640px; margin: 0 auto; padding: 0 12px; }

  /* TABS */
  .tabs { display: flex; gap: 6px; margin: 12px 0 10px; }
  .tab { flex: 1; padding: 9px 4px; font-size: 0.72rem; font-weight: 700; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--muted); cursor: pointer; text-align: center; transition: all .2s; }
  .tab.on { background: rgba(245,166,35,0.15); border-color: rgba(245,166,35,0.4); color: var(--gold); }

  .tc { display: none; }
  .tc.on { display: block; }

  /* LIVE SCOREBOARD */
  .live-section { margin-bottom: 10px; }
  .live-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .live-title { font-size: 0.7rem; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 0.07em; }
  .live-upd { font-size: 0.62rem; color: var(--muted); }
  .live-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-right: 4px; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .live-game { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 10px 14px; margin-bottom: 6px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; }
  .live-game.active { border-color: rgba(34,197,94,0.35); background: rgba(34,197,94,0.04); }
  .live-game.final { border-color: rgba(255,255,255,0.12); }
  .lg-time-a { text-align: right; font-size: 0.82rem; font-weight: 600; }
  .lg-time-b { text-align: left; font-size: 0.82rem; font-weight: 600; }
  .lg-center { text-align: center; }
  .lg-score { font-size: 1.1rem; font-weight: 800; color: var(--gold); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .lg-status { font-size: 0.6rem; color: var(--muted); margin-top: 2px; }
  .lg-status.live { color: var(--green); font-weight: 700; }
  .lg-status.extra { color: var(--gold); font-weight: 700; }
  .live-game.extra { border-color: rgba(245,166,35,0.35); background: rgba(245,166,35,0.04); }
  .lg-meta { font-size: 0.63rem; color: var(--muted); text-align: center; margin-top: 3px; grid-column: 1/-1; }

  /* RANKING */
  .notice { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 12px 14px; font-size: 0.78rem; color: var(--muted); text-align: center; margin-bottom: 10px; line-height: 1.5; }
  .rc { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 11px 12px; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: border-color .15s; position: relative; overflow: hidden; }
  .rc:hover { border-color: rgba(245,166,35,0.2); }
  .rc.r1 { border-color: rgba(255,215,0,0.3); }
  .rc.r2 { border-color: rgba(192,192,192,0.25); }
  .rc.r3 { border-color: rgba(205,127,50,0.25); }
  .medal { position: absolute; top: 0; right: 0; bottom: 0; width: 3px; }
  .m1 { background: var(--gold2); }
  .m2 { background: #c0c0c0; }
  .m3 { background: #cd7f32; }
  .rpos { font-size: 1rem; font-weight: 900; min-width: 32px; text-align: center; }
  .rinfo { flex: 1; min-width: 0; }
  .rname { font-size: 0.85rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rbadges { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
  .mk { font-size: 0.58rem; padding: 2px 5px; border-radius: 6px; font-weight: 700; }
  .mk10 { background: rgba(255,215,0,0.18); color: var(--gold); }
  .mk6  { background: rgba(34,197,94,0.18); color: var(--green); }
  .mk4  { background: rgba(251,191,36,0.18); color: #fbbf24; }
  .mk1  { background: rgba(239,68,68,0.18); color: var(--red); }
  .rpts { text-align: right; flex-shrink: 0; }
  .rpn { font-size: 1.2rem; font-weight: 900; color: var(--gold); line-height: 1; }
  .rpl { font-size: 0.58rem; color: var(--muted); }

  /* FICHA */
  .psel-wrap { margin-bottom: 10px; }
  select.psel { width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 8px; font-size: 0.84rem; outline: none; }
  .ficha-table { width: 100%; border-collapse: collapse; font-size: 0.72rem; }
  .ficha-table th { background: var(--card2); color: var(--gold); padding: 7px 5px; text-align: center; position: sticky; top: 0; }
  .ficha-table td { padding: 6px 4px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .ficha-table tr:hover td { background: rgba(255,255,255,0.03); }
  .rb { font-size: 0.62rem; padding: 2px 6px; border-radius: 8px; font-weight: 700; }
  .b10{background:rgba(255,215,0,.2);color:var(--gold)} .b6{background:rgba(34,197,94,.2);color:var(--green)}
  .b4{background:rgba(251,191,36,.2);color:#fbbf24} .b1{background:rgba(239,68,68,.2);color:var(--red)}
  .b0{background:rgba(100,100,100,.15);color:var(--muted)}

  /* JOGOS */
  .jt { width: 100%; border-collapse: collapse; font-size: 0.74rem; }
  .jt th { background: var(--card2); color: var(--gold); padding: 7px 5px; text-align: center; }
  .jt td { padding: 7px 5px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .jt-live td { background: rgba(34,197,94,0.05); }
  .tw { overflow-x: auto; border-radius: var(--r); }
  .live-indicator { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-right: 3px; animation: pulse 1.5s infinite; }

  /* LOADING */
  #loading { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 0.82rem; }
  .spin { display: inline-block; width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>🏆 Bolão do Ronaldão</h1>
  <p>Copa do Mundo 2026</p>
  <div class="phase-badge">⚔️ 16 Avos de Final</div>
</header>

<!-- Badge simulador — só aparece quando ativo -->
<div id="sim-badge" style="display:none;background:rgba(168,85,247,0.15);border-bottom:1px solid rgba(168,85,247,0.3);padding:6px 16px;text-align:center;font-size:0.7rem;color:#c4b5fd;font-weight:600">
  🧪 Modo simulação ativo — dados reais da ESPN não estão sendo usados
</div>

<div class="wrap">
  <div class="tabs">
    <div class="tab on" onclick="sTab('rank',this)">🏆 Ranking</div>
    <div class="tab" onclick="sTab('jogos',this)">📋 Jogos</div>

        <tbody id="jtbd"></tbody>
      </table>

  <!-- FICHA -->
  <div id="tab-ficha" class="tc">

    <div id="fc"></div>

</div>

<script>
// ════════════════════════════════════════════════
// CONFIGURAÇÃO
// ════════════════════════════════════════════════
const SUPABASE_URL  = 'https://ycwdtdsvwhdjqjthlkfx.supabase.co';
const SUPABASE_ANON = 'sb_publishable_qBK2kKwx4ea3JEeTQrUmgg_7vOoQx1S';

// ESPN API endpoint — sem key, grátis
const ESPN_URL = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard';

// Polling: a cada 60s durante jogo ativo, a cada 5min fora
let pollInterval = null;

// ════════════════════════════════════════════════
// JOGOS DA FASE (mesma lista do formulário)
// ════════════════════════════════════════════════
const JOGOS = [
  { num:1,  data:'28/06', hora:'16h00', local:'Los Angeles',      a:'África do Sul',   b:'Canadá'          },
  { num:2,  data:'29/06', hora:'14h00', local:'Houston',          a:'Brasil',          b:'Japão'           },
  { num:3,  data:'29/06', hora:'17h30', local:'Boston',           a:'Alemanha',        b:'Paraguai'        },
  { num:4,  data:'29/06', hora:'22h00', local:'Monterrey',        a:'Holanda',         b:'Marrocos'        },
  { num:5,  data:'30/06', hora:'14h00', local:'Dallas',           a:'Costa do Marfim', b:'Noruega'         },
  { num:6,  data:'30/06', hora:'18h00', local:'Nova York/NJ',     a:'França',          b:'Suécia'          },
  { num:7,  data:'30/06', hora:'22h00', local:'Cidade do México', a:'México',          b:'Equador'         },
  { num:8,  data:'01/07', hora:'13h00', local:'Atlanta',          a:'Inglaterra',      b:'Rep. D. Congo'   },
  { num:9,  data:'01/07', hora:'17h00', local:'Seattle',          a:'Bélgica',         b:'Senegal'         },
  { num:10, data:'01/07', hora:'21h00', local:'Santa Clara',      a:'Estados Unidos',  b:'Bósnia'          },
  { num:11, data:'02/07', hora:'16h00', local:'Los Angeles',      a:'Espanha',         b:'Áustria'         },
  { num:12, data:'02/07', hora:'20h00', local:'Toronto',          a:'Croácia',         b:'Portugal'        },
  { num:13, data:'03/07', hora:'00h00', local:'Vancouver',        a:'Suíça',           b:'Argélia'             },
  { num:14, data:'03/07', hora:'15h00', local:'Dallas',           a:'Austrália',       b:'Egito'           },
  { num:15, data:'03/07', hora:'19h00', local:'Miami',            a:'Argentina',       b:'Cabo Verde'      },
  { num:16, data:'03/07', hora:'22h30', local:'Kansas City',      a:'Colômbia',        b:'Gana'            },
];

// Mapeamento nomes ESPN → nomes do bolão
const ESPN_MAP = {
  'South Africa':'África do Sul','Canada':'Canadá','Brazil':'Brasil','Japan':'Japão',
  'Germany':'Alemanha','Paraguay':'Paraguai','Netherlands':'Holanda','Morocco':'Marrocos',
  "Ivory Coast":"Costa do Marfim","Cote d'Ivoire":"Costa do Marfim","Côte d'Ivoire":"Costa do Marfim",
  'Norway':'Noruega','France':'França','Sweden':'Suécia','Mexico':'México','Ecuador':'Equador',
  'England':'Inglaterra','Congo DR':'Rep. D. Congo','DR Congo':'Rep. D. Congo','Democratic Republic of Congo':'Rep. D. Congo',
  'Belgium':'Bélgica','Senegal':'Senegal',
  'United States':'Estados Unidos','Bosnia and Herzegovina':'Bósnia','Bosnia-Herzegovina':'Bósnia',
  'Spain':'Espanha','Austria':'Áustria',
  'Croatia':'Croácia','Portugal':'Portugal',
  'Switzerland':'Suíça','Iran':'Irã','IR Iran':'Irã',
  'Australia':'Austrália','Egypt':'Egito',
  'Argentina':'Argentina','Cape Verde':'Cabo Verde','Cape Verde Islands':'Cabo Verde',
  'Colombia':'Colômbia','Ghana':'Gana',
  'Saudi Arabia':'Arábia Saudita','Uzbekistan':'Uzbequistão',
  'Algeria':'Argélia','Jordan':'Jordânia','Uruguay':'Uruguai','South Korea':'Rep. Coréia',
};

// Estado global
let RESULTADOS = {}; // num -> {a, b, status, clock, period}
let PART = [];
let lastUpdate = null;
let hasActiveGame = false;

// ════════════════════════════════════════════════
// PONTUAÇÃO (mesmas regras da fase 1)
// ════════════════════════════════════════════════
function pts(pa, pb, ra, rb) {
  if (ra == null || rb == null || pa == null || pb == null) return null;
  if (pa === ra && pb === rb) return 10;
  const lp = pa > pb ? 'A' : pb > pa ? 'B' : 'E';
  const lr = ra > rb ? 'A' : rb > ra ? 'B' : 'E';
  const ok = lp === lr;
  if (ok && (pa === ra || pb === rb || (lp === 'E' && lr === 'E'))) return 6;
  if (ok) return 4;
  if (pa === ra || pb === rb) return 1;
  return 0;
}

function calcP(p) {
  let tot=0, p10=0, p6=0, p4=0, p1=0;
  p.palpites.forEach(pl => {
    const r = RESULTADOS[pl.num];
    if (!r || r.a == null) return;
    const v = pts(pl.a, pl.b, r.a, r.b);
    if (v === null) return;
    tot += v;
    if (v===10) p10++; else if(v===6) p6++; else if(v===4) p4++; else if(v===1) p1++;
  });
  return { tot, p10, p6, p4, p1 };
}

// ════════════════════════════════════════════════
// ESPN API — busca placares
// ════════════════════════════════════════════════
async function fetchESPN() {
  // ── Modo simulador: lê do localStorage se admin ativou ──────────────
  if (localStorage.getItem('bolao_sim_ativo') === '1') {
    try {
      const sim = JSON.parse(localStorage.getItem('bolao_sim') || 'null');
      if (sim) {
        const j = JOGOS.find(g => g.num === sim.num);
        if (j) {
          const isExtraTime = sim.isExtraTime || sim.period >= 3;
          // Reconstrói linescores simulados para calcular 90min
          const fakeLines = [
            { home: sim.linesHome[0], away: sim.linesAway[0] },
            { home: sim.linesHome[1], away: sim.linesAway[1] },
          ];
          // Injeta como se fosse dado real da ESPN
          const fakeComp = {
            status: {
              type: { state: sim.state, name: sim.statusName, completed: sim.completed, shortDetail: sim.statusName },
              displayClock: sim.clock,
              period: sim.period,
            },
            competitors: [
              { homeAway: 'home', score: String(sim.scoreA), team: { displayName: sim.timeA } },
              { homeAway: 'away', score: String(sim.scoreB), team: { displayName: sim.timeB } },
            ],
            linescores: fakeLines,
          };
          parseESPNComp(fakeComp, j.num);
          hasActiveGame = sim.state === 'in' && !isExtraTime;
          lastUpdate = new Date();
          ajustarPolling();

          // Mostra badge de simulação
          const badge = document.getElementById('sim-badge');
          if (badge) badge.style.display = 'flex';
        }
        return;
      }
    } catch(e) { console.warn('Sim parse error:', e); }
  }
  // Esconde badge se simulador desligado
  const badge = document.getElementById('sim-badge');
  if (badge) badge.style.display = 'none';

  // ── Fluxo normal: ESPN API ───────────────────────────────────────────
  try {
    const dates = getRelevantDates();
    const res = await fetch(`${ESPN_URL}?dates=${dates}&limit=50`);
    if (!res.ok) return;
    const data = await res.json();
    parseESPN(data);
  } catch(e) {
    console.warn('ESPN fetch error:', e);
  }
}

function getRelevantDates() {
  // Retorna data atual e próximos 2 dias no formato YYYYMMDD
  const now = new Date();
  const fmt = d => d.toISOString().slice(0,10).replace(/-/g,'');
  const d1 = new Date(now); d1.setDate(d1.getDate()-1);
  const d2 = new Date(now); d2.setDate(d2.getDate()+1);
  return fmt(d1) + '-' + fmt(d2);
}

function parseESPN(data) {
  hasActiveGame = false;
  const events = data.events || [];
  events.forEach(ev => {
    const comp = ev.competitions?.[0];
    if (!comp) return;
    const home = comp.competitors?.find(c => c.homeAway === 'home');
    const away = comp.competitors?.find(c => c.homeAway === 'away');
    if (!home || !away) return;

    const homeNome = ESPN_MAP[home.team?.displayName] || home.team?.displayName;
    const awayNome = ESPN_MAP[away.team?.displayName] || away.team?.displayName;

    // Encontra o jogo correspondente pelo nome dos times
    const jogo = JOGOS.find(j =>
      (normalize(j.a) === normalize(homeNome) && normalize(j.b) === normalize(awayNome)) ||
      (normalize(j.a) === normalize(awayNome) && normalize(j.b) === normalize(homeNome))
    );
    if (!jogo) return;

    const status = comp.status?.type;
    const state = status?.state || 'pre'; // pre | in | post
    const clock = comp.status?.displayClock || '0\'';
    const period = comp.status?.period || 0;
    const completed = status?.completed || false;
    const statusName = status?.name || ''; // ex: STATUS_FINAL, STATUS_IN_PROGRESS

    // ── REGRA: apenas tempo normal (90 min) ──────────────────────────────
    // period 1 = 1º tempo, period 2 = 2º tempo, period 3+ = prorrogação
    // STATUS_FINAL_AET = fim na prorrogação, STATUS_FINAL_PEN = pênaltis
    // Nesses casos, usamos o placar do fim do tempo normal (90min),
    // capturado via linescores se disponível, ou travamos o placar do period 2.
    const isExtraTime = period >= 3 || statusName.includes('AET') || statusName.includes('PEN');
    const isRegularFinal = completed && !isExtraTime;
    const isRegularInProgress = state === 'in' && period <= 2;

    // Tenta obter placar do tempo normal via linescores (ESPN fornece por período)
    let scoreHome90 = null, scoreAway90 = null;
    const lines = comp.linescores || [];
    if (lines.length >= 2) {
      // Soma apenas os 2 primeiros períodos (1º e 2º tempo)
      scoreHome90 = lines.slice(0, 2).reduce((s, l) => s + (parseInt(l.home) || 0), 0);
      scoreAway90 = lines.slice(0, 2).reduce((s, l) => s + (parseInt(l.away) || 0), 0);
    }

    // Placar a usar: se tiver linescores do tempo normal, usa; senão usa o placar geral
    // (durante os 90min o placar geral = placar do tempo normal)
    let scoreHome, scoreAway;
    if (state === 'pre') {
      scoreHome = null; scoreAway = null;
    } else if (isExtraTime && scoreHome90 !== null) {
      // Jogo foi para prorr/pênaltis: usa placar dos 90min via linescores
      scoreHome = scoreHome90; scoreAway = scoreAway90;
    } else {
      // Tempo normal em andamento ou finalizado normalmente: usa placar atual
      scoreHome = parseInt(home.score); scoreAway = parseInt(away.score);
    }

    // Detecta se os times estão na ordem certa
    const isHomeA = normalize(j.a) === normalize(homeNome);
    const ra = isHomeA ? scoreHome : scoreAway;
    const rb = isHomeA ? scoreAway : scoreHome;

    // "completed" para fins do bolão = jogo encerrado no tempo normal OU após prorr/pen
    // Em ambos os casos o placar do bolão (90min) já está travado
    const completedBolao = completed;

    // Durante prorrogação/pênaltis: jogo ainda "em andamento" mas placar bolão já travado
    const statusDisplay = isExtraTime
      ? (statusName.includes('PEN') ? '⚽ Pênaltis (placar 90min válido)' : `⏱ Prorrogação (placar 90min válido)`)
      : state === 'in' ? `⚽ ${clock}` : null;

    RESULTADOS[jogo.num] = {
      a: ra, b: rb,
      status: state,
      clock,
      period,
      completed: completedBolao,
      isExtraTime,
      statusTxt: statusDisplay || status?.shortDetail || '',
      homeNome, awayNome,
      homeScore: scoreHome,
      awayScore: scoreAway,
    };

    // Só conta como "ao vivo" se estiver no tempo normal (period 1 ou 2)
    // Prorrogação/pênaltis: placar já travado, não precisa de polling acelerado
    if (state === 'in' && !isExtraTime) hasActiveGame = true;
  });

  lastUpdate = new Date();
  ajustarPolling();
}

function normalize(s) {
  return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
}

// Versão que processa um único comp já extraído (usado pelo simulador)
function parseESPNComp(comp, numJogo) {
  const home = comp.competitors?.find(c => c.homeAway === 'home');
  const away = comp.competitors?.find(c => c.homeAway === 'away');
  if (!home || !away) return;

  const status = comp.status?.type;
  const state = status?.state || 'pre';
  const clock = comp.status?.displayClock || '0\'';
  const period = comp.status?.period || 0;
  const completed = status?.completed || false;
  const statusName = status?.name || '';

  const isExtraTime = period >= 3 || statusName.includes('AET') || statusName.includes('PEN');

  let scoreHome90 = null, scoreAway90 = null;
  const lines = comp.linescores || [];
  if (lines.length >= 2) {
    scoreHome90 = lines.slice(0,2).reduce((s,l) => s + (parseInt(l.home)||0), 0);
    scoreAway90 = lines.slice(0,2).reduce((s,l) => s + (parseInt(l.away)||0), 0);
  }

  let scoreHome, scoreAway;
  if (state === 'pre') { scoreHome = null; scoreAway = null; }
  else if (isExtraTime && scoreHome90 !== null) { scoreHome = scoreHome90; scoreAway = scoreAway90; }
  else { scoreHome = parseInt(home.score); scoreAway = parseInt(away.score); }

  const statusDisplay = isExtraTime
    ? (statusName.includes('PEN') ? '⚽ Pênaltis (placar 90min válido)' : '⏱ Prorrogação (placar 90min válido)')
    : state === 'in' ? `⚽ ${clock}` : null;

  RESULTADOS[numJogo] = {
    a: scoreHome, b: scoreAway,
    status: state, clock, period, completed, isExtraTime,
    statusTxt: statusDisplay || statusName,
    homeNome: home.team?.displayName,
    awayNome: away.team?.displayName,
    homeScore: scoreHome, awayScore: scoreAway,
  };
}

function ajustarPolling() {
  if (pollInterval) clearInterval(pollInterval);
  const intervalo = hasActiveGame ? 60000 : 300000; // 60s ao vivo, 5min fora
  pollInterval = setInterval(fetchAll, intervalo);
}

// ════════════════════════════════════════════════
// SUPABASE — busca palpites
// ════════════════════════════════════════════════
async function fetchPalpites() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/palpites_16avos?select=nome,palpites,criado_em&order=criado_em.asc`, {
    headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` }
  });
  if (!res.ok) throw new Error('Erro ao buscar palpites');
  const rows = await res.json();

  // Deduplica: mantém o último envio de cada nome
  const map = {};
  rows.forEach(r => { map[r.nome] = r; });
  PART = Object.values(map).map(r => ({ nome: r.nome, palpites: r.palpites || [] }));
}

// ════════════════════════════════════════════════
// RENDER LIVE SCOREBOARD
// ════════════════════════════════════════════════
function renderLive(containerId) {
  const ativos = JOGOS.filter(j => {
    const r = RESULTADOS[j.num];
    return r && (r.status === 'in' || r.completed);
  });
  if (!ativos.length) { document.getElementById(containerId).innerHTML = ''; return; }

  const upd = lastUpdate ? lastUpdate.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}) : '--';
  let html = `<div class="live-header">
    <span class="live-title">${hasActiveGame?'<span class="live-dot"></span>Ao vivo':'Últimos resultados'}</span>
    <span class="live-upd">atualizado ${upd}</span>
  </div>`;

  ativos.forEach(j => {
    const r = RESULTADOS[j.num];
    const isLive = r.status === 'in' && !r.isExtraTime;
    const isExtraTime = r.isExtraTime;
    const cls = isLive ? 'active' : isExtraTime ? 'extra' : 'final';
    const scoreA = r.a != null ? r.a : '-';
    const scoreB = r.b != null ? r.b : '-';
    let statusLbl;
    if (isLive) statusLbl = `<span class="lg-status live">⚽ ${r.clock}</span>`;
    else if (isExtraTime) statusLbl = `<span class="lg-status extra">⏱ Prorr./Pên. — placar 90min válido</span>`;
    else statusLbl = `<span class="lg-status">Final</span>`;
    html += `<div class="live-game ${cls}">
      <div class="lg-time-a">${j.a}</div>
      <div class="lg-center"><div class="lg-score">${scoreA} × ${scoreB}</div>${statusLbl}</div>
      <div class="lg-time-b">${j.b}</div>
      <div class="lg-meta">${j.local} · Jogo ${j.num}</div>
    </div>`;
  });

  document.getElementById(containerId).innerHTML = html;
}

// ════════════════════════════════════════════════
// RENDER RANKING
// ════════════════════════════════════════════════
function renderRanking() {
  const jogosComResult = Object.keys(RESULTADOS).filter(k => RESULTADOS[k].a != null).length;
  const total = JOGOS.length;

  let noticeHtml = '';
  if (jogosComResult === 0) {
    noticeHtml = `⏳ Aguardando início dos jogos. <strong>${PART.length} participantes</strong> inscritos.`;
  } else {
    const liveCount = Object.values(RESULTADOS).filter(r => r.status === 'in').length;
    noticeHtml = `${hasActiveGame ? '🔴 ' : ''}${liveCount > 0 ? liveCount + ' jogo(s) ao vivo · ' : ''}📊 <strong>${jogosComResult}</strong> de <strong>${total}</strong> jogos com resultado · <strong>${PART.length} participantes</strong>`;
  }
  const n = document.getElementById('notice');
  n.innerHTML = noticeHtml;
  n.style.display = 'block';

  const scores = PART.map(p => ({ nome: p.nome, ...calcP(p) }));
  scores.sort((a,b) => {
    if (b.tot !== a.tot) return b.tot - a.tot;
    if (b.p10 !== a.p10) return b.p10 - a.p10;
    if (b.p6 !== a.p6) return b.p6 - a.p6;
    if (b.p4 !== a.p4) return b.p4 - a.p4;
    return b.p1 - a.p1;
  });

  const ranked = [];
  let pos = 1;
  scores.forEach((s,i) => {
    if (i > 0) {
      const prev = scores[i-1];
      if (!(prev.tot===s.tot && prev.p10===s.p10 && prev.p6===s.p6 && prev.p4===s.p4 && prev.p1===s.p1)) pos = i+1;
    }
    ranked.push({ ...s, pos });
  });

  const medals = ['🥇','🥈','🥉'];
  const mColors = {1:'var(--gold2)',2:'#c0c0c0',3:'#cd7f32'};

  document.getElementById('rl').innerHTML = ranked.map(r => {
    const p = r.pos;
    const medal = p<=3 ? medals[p-1] : `${p}º`;
    const mbar = p<=3 ? `<div class="medal m${p}"></div>` : '';
    const col = mColors[p] || 'var(--muted)';
    return `<div class="rc ${p<=3?'r'+p:''}" onclick="goFicha('${r.nome.replace(/'/g,"\\'")}')">
      ${mbar}
      <div class="rpos" style="color:${col}">${medal}</div>
      <div class="rinfo">
        <div class="rname">${r.nome}</div>
        <div class="rbadges">
          <span class="mk mk10">🏆 ${r.p10}</span>
          <span class="mk mk6">✅ ${r.p6}</span>
          <span class="mk mk4">🎯 ${r.p4}</span>
          <span class="mk mk1">⚡ ${r.p1}</span>
        </div>
      </div>
      <div class="rpts"><div class="rpn">${r.tot}</div><div class="rpl">pts</div></div>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════════════
// RENDER TABELA DE JOGOS
// ════════════════════════════════════════════════
function renderJogos() {
  document.getElementById('jtbd').innerHTML = JOGOS.map(j => {
    const r = RESULTADOS[j.num];
    const isLive = r?.status === 'in' && !r?.isExtraTime;
    const isExtra = r?.isExtraTime;
    const isFinal = r?.completed;
    const placar = r?.a != null ? `${r.a} × ${r.b}` : '— × —';
    const placarNote = isExtra ? ' <span style="font-size:.58rem;color:var(--gold)">(90min)</span>' : '';
    let statusLbl;
    if (isLive) statusLbl = `<span class="live-indicator"></span>${r.clock}`;
    else if (isExtra) statusLbl = `<span style="color:var(--gold)">Prorr./Pên.</span>`;
    else if (isFinal) statusLbl = 'Final';
    else statusLbl = j.hora;
    return `<tr class="${isLive?'jt-live':''}">
      <td style="color:var(--muted)">${j.num}</td>
      <td style="color:var(--muted);white-space:nowrap">${j.data}</td>
      <td style="text-align:right;font-size:.78rem">${j.a}</td>
      <td style="font-weight:700;color:${isLive?'var(--green)':isExtra?'var(--gold)':isFinal?'var(--gold)':'var(--muted)'}">${placar}${placarNote}</td>
      <td style="text-align:left;font-size:.78rem">${j.b}</td>
      <td style="font-size:.63rem;color:${isLive?'var(--green)':'var(--muted)'}">${statusLbl}</td>
    </tr>`;
  }).join('');
}

// ════════════════════════════════════════════════
// RENDER FICHA PARTICIPANTE
// ════════════════════════════════════════════════
function goFicha(nome) {
  const idx = PART.findIndex(p => p.nome === nome);
  if (idx < 0) return;
  document.getElementById('psel').value = idx;
  sTab('ficha', document.querySelectorAll('.tab')[2]);
  renderFicha();
}

function renderFicha() {
  const idx = parseInt(document.getElementById('psel').value);
  const p = PART[idx];
  if (!p) return;
  const { tot, p10, p6, p4, p1 } = calcP(p);

  const rows = p.palpites.map(pl => {
    const j = JOGOS.find(g => g.num === pl.num);
    if (!j) return '';
    const r = RESULTADOS[pl.num];
    const v = r?.a != null ? pts(pl.a, pl.b, r.a, r.b) : null;
    const placarR = r?.a != null ? `${r.a}×${r.b}` : '—';
    const placarP = `${pl.a}×${pl.b}`;
    let bc = 'b0', vs = v != null ? String(v) : '—';
    if (v===10) bc='b10'; else if(v===6) bc='b6'; else if(v===4) bc='b4'; else if(v===1) bc='b1';
    const isLive = r?.status === 'in' && !r?.isExtraTime;
    const isExtra = r?.isExtraTime;
    const rowBg = isLive ? 'background:rgba(34,197,94,0.04)' : isExtra ? 'background:rgba(245,166,35,0.04)' : '';
    const placarExtra = isExtra ? `<span style="font-size:.58rem;color:var(--gold);margin-left:2px">(90min)</span>` : '';
    return `<tr style="${rowBg}">
      <td>${pl.num}</td>
      <td style="text-align:right;font-size:.7rem">${j.a}</td>
      <td style="color:var(--muted)">${placarP}</td>
      <td style="color:${r?.a!=null?'var(--gold)':'var(--muted)'}">${placarR}${isLive?'<span class="live-indicator" style="margin-left:3px"></span>':''}${placarExtra}</td>
      <td style="text-align:left;font-size:.7rem">${j.b}</td>
      <td><span class="rb ${bc}">${vs}</span></td>
    </tr>`;
  }).join('');

  document.getElementById('fc').innerHTML = `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:.85rem;font-weight:700">${p.nome}</div>
      <div style="font-size:1.3rem;font-weight:900;color:var(--gold)">${tot} <span style="font-size:.65rem;color:var(--muted);font-weight:400">pts</span></div>
    </div>
    <div class="tw"><table class="ficha-table">
      <thead><tr><th>#</th><th>Time A</th><th>Palpite</th><th>Resultado</th><th>Time B</th><th>Pts</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

// ════════════════════════════════════════════════
// SUPABASE — busca resultados salvos pelo admin
// ════════════════════════════════════════════════
async function fetchResultados() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/resultados_16avos?select=num_jogo,time_a,time_b,gols_a,gols_b`,
      { headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` } }
    );
    if (!res.ok) return;
    const rows = await res.json();
    rows.forEach(r => {
      const numJogo = r.num_jogo;
      const existente = RESULTADOS[numJogo];
      // Só usa o Supabase se a ESPN não trouxe dado ao vivo para este jogo
      // (ESPN ao vivo tem prioridade; Supabase serve como resultado oficial pós-jogo)
      const espnAoVivo = existente && existente.status === 'in';
      if (!espnAoVivo && r.gols_a != null && r.gols_b != null) {
        RESULTADOS[numJogo] = {
          a: r.gols_a,
          b: r.gols_b,
          status: 'post',
          completed: true,
          isExtraTime: false,
          clock: 'Final',
          period: 2,
          statusTxt: 'Final (admin)',
          // Atualiza nomes dos times se vieram do admin
          homeNome: r.time_a,
          awayNome: r.time_b,
        };
        // Atualiza também o nome no array JOGOS se estava "A definir"
        const jogo = JOGOS.find(j => j.num === numJogo);
        if (jogo) {
          if (jogo.a === 'A definir' && r.time_a) jogo.a = r.time_a;
          if (jogo.b === 'A definir' && r.time_b) jogo.b = r.time_b;
        }
      }
    });
  } catch(e) {
    console.warn('Erro ao buscar resultados:', e);
  }
}

// ════════════════════════════════════════════════
// TABS
// ════════════════════════════════════════════════
function sTab(id, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.tc').forEach(t => { t.classList.remove('on'); t.style.display = 'none'; });
  el.classList.add('on');
  const panel = document.getElementById('tab-' + id);
  panel.classList.add('on');
  panel.style.display = 'block';
}

// ════════════════════════════════════════════════
// INICIALIZAÇÃO
// ════════════════════════════════════════════════
async function fetchAll() {
  // Ordem importa: ESPN primeiro, depois Supabase preenche o que falta
  await Promise.all([fetchESPN(), fetchPalpites()]);
  await fetchResultados(); // mescla resultados do admin por cima
  document.getElementById('loading').style.display = 'none';
  document.getElementById('tab-rank').style.display = 'block';

  renderLive('live-section');
  renderLive('live-section2');
  renderRanking();
  renderJogos();

  // Popular select da ficha
  document.getElementById('psel').innerHTML = PART.map((p,i) => `<option value="${i}">${p.nome}</option>`).join('');
  if (PART.length) renderFicha();
}

document.addEventListener('DOMContentLoaded', () => {
  fetchAll();
  // Polling inicial: 2min, ajustado depois conforme status do jogo
  pollInterval = setInterval(fetchAll, 120000);
});
</script>
